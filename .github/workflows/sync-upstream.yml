name: Sync fork from upstream

# Merges charlie947/social-media-skills main into this fork's main on a schedule.
# The schema-fix commit (mirrors upstream PR #1) lives on top and is preserved
# across merges as long as upstream does not also rewrite plugins[0].source.
#
# If a merge conflict ever occurs, this workflow fails and GitHub emails the fork
# owner. Resolution steps: reference/social-media-skills-sync.md in the
# claude-code project.

on:
  schedule:
    - cron: "15 13 * * 1"   # Mondays 13:15 UTC (~6am Pacific), offset 15min from marketingskills
  workflow_dispatch: {}     # Manual trigger button in Actions UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main
        run: |
          git remote add upstream https://github.com/charlie947/social-media-skills.git
          git fetch upstream main
          git merge --no-edit upstream/main
          git push origin main
